<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindMate - Welcome</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Intro Styles -->
    <link rel="stylesheet" href="intro.css">
</head>
<body>

<div id="mindmate-intro">
  <div class="intro-content">
    
    <!-- ==================== LOGO PHASE ==================== -->
    <div class="intro-logo">
      <h1>MindMate</h1>
    </div>
    
    <!-- ==================== FEATURE SLIDES ==================== -->
    <div class="intro-slides">
      
      <!-- Slide 1: Track your mood -->
      <div class="intro-slide">
        <div class="intro-slide-content">
          <div class="intro-slide-icon">📊</div>
          <h2>Track your mood</h2>
          <p>Daily check-ins to understand your emotional patterns</p>
        </div>
      </div>
      
      <!-- Slide 2: Reflect daily -->
      <div class="intro-slide">
        <div class="intro-slide-content">
          <div class="intro-slide-icon">✍️</div>
          <h2>Reflect daily</h2>
          <p>Journaling prompts to process your thoughts</p>
        </div>
      </div>
      
      <!-- Slide 3: Calm your mind -->
      <div class="intro-slide">
        <div class="intro-slide-content">
          <div class="intro-slide-icon">🧘</div>
          <h2>Calm your mind</h2>
          <p>Guided exercises for peace and clarity</p>
        </div>
      </div>
      
    </div>
    
    <!-- ==================== FINAL SCREEN ==================== -->
    <div class="intro-final">
      <p class="intro-final-text">Your private mental wellness companion</p>
      <button class="intro-cta-button" aria-label="Get started with MindMate">Get Started</button>
    </div>
    
  </div>
</div>

<!-- Intro Logic -->
<script src="intro.js"></script>

</body>
</html>
